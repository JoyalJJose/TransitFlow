# TransitFlow Mosquitto MQTT Broker Configuration

# MQTT over TLS only -- no plaintext listener
listener 8883
protocol mqtt

# TLS certificates
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate false
tls_version tlsv1.2

# Persistence for durable sessions
persistence true
persistence_location /mosquitto/data/

# Unlimited queued messages for offline persistent-session clients
max_queued_messages 0

# 10 MB max message size (sufficient for thermal images; model chunks are 256KB)
message_size_limit 10485760

# Allow anonymous connections for development
# Switch to password_file / per_listener_settings for production
allow_anonymous true

# Logging
log_dest stdout
log_type all
connection_messages true
